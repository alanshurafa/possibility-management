name: Sync map data

on:
  push:
    branches:
      - full-map
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip map sync]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: full-map
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Regenerate map data
        run: python scripts/update_map_data.py
      - name: Commit generated data
        run: |
          if git diff --quiet; then
            echo "Map data already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/registry.json data/archive-manifest.json data/layout.json _redirects
          git commit -m "Sync map data [skip map sync]"
          git push origin HEAD:full-map

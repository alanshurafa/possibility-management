<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="refresh" content="0; url=../3d-bubble-map/" />
<title>SpacePort 3D Bubble Map</title>
<link rel="canonical" href="../3d-bubble-map/" />
<style>
  :root {
    color-scheme: dark;
    --bg0: #05070d;
    --bg1: #0a1220;
    --panel: rgba(8, 14, 26, 0.78);
    --border: rgba(125, 211, 252, 0.26);
    --ink: #e8f4ff;
    --muted: #8fa5bb;
    --accent: #7dd3fc;
  }
  * { box-sizing: border-box; }
  html, body { min-height: 100%; margin: 0; }
  body {
    display: grid;
    place-items: center;
    padding: 24px;
    font: 15px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    color: var(--ink);
    background:
      radial-gradient(circle at 20% 18%, rgba(125, 211, 252, 0.18), transparent 30%),
      radial-gradient(circle at 82% 78%, rgba(183, 148, 246, 0.14), transparent 35%),
      linear-gradient(135deg, var(--bg1), var(--bg0) 72%);
  }
  main {
    width: min(520px, 100%);
    padding: 22px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: 0 18px 60px rgba(0, 0, 0, 0.42);
  }
  h1 {
    margin: 0 0 8px;
    font-size: 18px;
    line-height: 1.25;
  }
  p { margin: 0 0 14px; color: var(--muted); }
  a { color: var(--accent); font-weight: 800; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
<script>
  window.location.replace("../3d-bubble-map/");
</script>
</head>
<body>
  <main>
    <h1>SpacePort Bubble Map is now 3D</h1>
    <p>The old 2D route now opens the default 3D Bubble Map.</p>
    <a href="../3d-bubble-map/">Open the 3D Bubble Map</a>
  </main>
</body>
</html>

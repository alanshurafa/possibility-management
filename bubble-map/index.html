<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Startover.xyz 2D Bubble Map Spaceport</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='11' fill='%237dd3fc'/%3E%3C/svg%3E" />
<style>
  :root {
    --bg0: #05060e;
    --bg1: #0a0e22;
    --panel: rgba(15, 20, 40, 0.62);
    --panel-strong: rgba(8, 12, 28, 0.78);
    --panel-brd: rgba(125, 180, 230, 0.18);
    --ink: #e6ecff;
    --ink-dim: #8a96c0;
    --accent: #7dd3fc;
    --accent-2: #b794f6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    font: 14px/1.5 "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1200px 800px at 78% 18%, rgba(80, 60, 160, 0.22), transparent 60%),
      radial-gradient(900px 700px at 12% 88%, rgba(20, 90, 150, 0.20), transparent 55%),
      radial-gradient(circle at 50% 50%, var(--bg1), var(--bg0) 75%);
  }
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.9; }
  #sigma-container { position: absolute; inset: 0; z-index: 1; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-brd);
    border-radius: 8px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
  }
  #header {
    position: absolute;
    z-index: 5;
    top: 18px;
    left: 18px;
    padding: 12px 16px;
    width: min(430px, calc(100vw - 36px));
  }
  #header h1 {
    margin: 0;
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 15px;
    line-height: 1.25;
    font-weight: 800;
    letter-spacing: 0.2px;
  }
  #header h1 .dot {
    flex: 0 0 auto;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #cfeaff, var(--accent) 55%, #2b6cb0);
    box-shadow: 0 0 12px var(--accent);
  }
  #header .sub { margin-top: 5px; color: var(--ink-dim); font-size: 12px; }
  #header a { color: var(--accent); text-decoration: none; }
  #header a:hover { color: #fff; text-decoration: underline; }
  #search-wrap { position: absolute; z-index: 5; top: 18px; right: 18px; }
  #search {
    width: 260px;
    padding: 10px 13px;
    border-radius: 8px;
    background: var(--panel-strong);
    color: var(--ink);
    border: 1px solid var(--panel-brd);
    outline: none;
    font-size: 13px;
  }
  #search::placeholder { color: var(--ink-dim); }
  #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.15); }
  #rail {
    position: absolute;
    z-index: 5;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding: 8px 6px;
    align-items: center;
  }
  #rail button {
    all: unset;
    cursor: pointer;
    width: 20px;
    height: 18px;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-dim);
    border-radius: 5px;
    transition: color .12s, background .12s;
  }
  #rail button[data-has="1"] { color: var(--ink); }
  #rail button[data-has="1"]:hover { background: rgba(125, 211, 252, 0.16); color: #fff; }
  #rail button[disabled] { opacity: 0.28; cursor: default; }
  #rail button.active { background: linear-gradient(90deg, var(--accent), var(--accent-2)); color: #08111f; }
  #controls {
    position: absolute;
    z-index: 5;
    left: 18px;
    bottom: 18px;
    width: min(315px, calc(100vw - 36px));
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    font-size: 12.5px;
  }
  #controls .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  #controls .row.tight { justify-content: flex-start; gap: 9px; }
  #controls .actions { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
  .switch { position: relative; width: 34px; height: 19px; flex: none; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    inset: 0;
    border-radius: 999px;
    cursor: pointer;
    background: rgba(120, 130, 170, 0.35);
    transition: .18s;
  }
  .slider::before {
    content: "";
    position: absolute;
    height: 13px;
    width: 13px;
    left: 3px;
    top: 3px;
    background: #e6ecff;
    border-radius: 50%;
    transition: .18s;
  }
  .switch input:checked + .slider { background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
  .switch input:checked + .slider::before { transform: translateX(15px); }
  input[type="range"] { width: 142px; accent-color: var(--accent-2); }
  .range-wrap { position: relative; width: 142px; display: flex; align-items: center; }
  .range-wrap input[type="range"] { width: 100%; }
  .range-value {
    position: absolute;
    right: 0;
    bottom: calc(100% + 5px);
    min-width: 42px;
    padding: 3px 6px;
    border: 1px solid rgba(125, 211, 252, 0.32);
    border-radius: 8px;
    background: rgba(4, 8, 18, 0.92);
    color: #eaf8ff;
    font-size: 10px;
    font-weight: 750;
    text-align: center;
    opacity: 0;
    transform: translateY(3px);
    transition: opacity 0.12s ease, transform 0.12s ease;
    pointer-events: none;
  }
  .range-wrap:hover .range-value,
  .range-wrap:focus-within .range-value {
    opacity: 1;
    transform: translateY(0);
  }
  .ghost {
    all: unset;
    cursor: pointer;
    color: var(--accent);
    font-weight: 700;
    padding: 4px 0;
    width: max-content;
  }
  .ghost:hover { text-decoration: underline; }
  #card {
    position: absolute;
    z-index: 5;
    right: 18px;
    bottom: 18px;
    width: 280px;
    padding: 14px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .15s, transform .15s;
    pointer-events: none;
  }
  #card.show { opacity: 1; transform: translateY(0); }
  #card .top { display: flex; gap: 12px; align-items: center; }
  #card img {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    flex: none;
    object-fit: cover;
    border: 1px solid var(--panel-brd);
    box-shadow: 0 0 16px rgba(125, 211, 252, 0.25);
  }
  #card .title { font-weight: 750; font-size: 15px; }
  #card .slug { color: var(--accent); font-size: 11.5px; }
  #card .tag { margin-top: 9px; color: var(--ink-dim); font-size: 12.5px; }
  #card .hint { margin-top: 9px; font-size: 11px; color: var(--ink-dim); opacity: 0.8; }
  #loading {
    position: absolute;
    z-index: 6;
    inset: 0;
    display: grid;
    place-items: center;
    color: var(--ink-dim);
    font-size: 13px;
    letter-spacing: 0.3px;
  }
  @media (max-width: 760px) {
    #header { top: 12px; left: 12px; width: calc(100vw - 24px); }
    #search-wrap { top: 150px; left: 12px; right: auto; }
    #search { width: calc(100vw - 24px); }
    #rail { display: none; }
    #controls { left: 12px; bottom: 12px; width: calc(100vw - 24px); }
    #card { right: 12px; left: 12px; bottom: 324px; width: auto; }
  }
</style>
</head>
<body>
  <svg id="stars"></svg>
  <div id="sigma-container"></div>

  <div id="header" class="panel">
    <h1><span class="dot"></span> Startover.xyz 2D Bubble Map Spaceport</h1>
    <div class="sub" id="counts">Possibility Management bubble map - loading...</div>
    <div class="sub"><a id="archive-link" href="archive/index.html">Browse the A-Z archive</a></div>
    <div class="sub"><a href="../3d-bubble-map/">Open the 3D bubble map</a></div>
    <div class="sub" id="build-status" style="opacity:.75"></div>
  </div>

  <div id="search-wrap">
    <input id="search" type="search" placeholder="Search sites..." autocomplete="off" />
  </div>

  <nav id="rail" class="panel" aria-label="A to Z index"></nav>

  <div id="controls" class="panel">
    <div class="row tight">
      <label class="switch" aria-label="Show curated links"><input type="checkbox" id="toggle-curated" checked /><span class="slider"></span></label>
      <span>Curated links</span>
    </div>
    <div class="row tight">
      <label class="switch" aria-label="Show organic links"><input type="checkbox" id="toggle-organic" checked /><span class="slider"></span></label>
      <span>Organic links</span>
    </div>
    <div class="row tight">
      <label class="switch" aria-label="Orbit every bubble around Radical Responsibility"><input type="checkbox" id="radical-orbit" checked /><span class="slider"></span></label>
      <span>Radical orbit</span>
    </div>
    <div class="row">
      <label for="zoom">Zoom</label>
      <span class="range-wrap">
        <input id="zoom" type="range" min="20" max="500" value="175" aria-describedby="zoom-value" />
        <output id="zoom-value" class="range-value" for="zoom">175%</output>
      </span>
    </div>
    <div class="row">
      <label for="tension">Tension</label>
      <span class="range-wrap">
        <input id="tension" type="range" min="0" max="100" step="0.05" value="0" aria-describedby="tension-value" />
        <output id="tension-value" class="range-value" for="tension">0%</output>
      </span>
    </div>
    <div class="row">
      <label for="bubble-size">Bubble size</label>
      <span class="range-wrap">
        <input id="bubble-size" type="range" min="55" max="800" value="100" aria-describedby="bubble-size-value" />
        <output id="bubble-size-value" class="range-value" for="bubble-size">100%</output>
      </span>
    </div>
    <div class="row">
      <label for="bubble-spacing">Spacing</label>
      <span class="range-wrap">
        <input id="bubble-spacing" type="range" min="70" max="460" value="100" aria-describedby="bubble-spacing-value" />
        <output id="bubble-spacing-value" class="range-value" for="bubble-spacing">100%</output>
      </span>
    </div>
    <div class="row tight">
      <label class="switch" aria-label="Size bubbles by number of links"><input type="checkbox" id="size-by-links" checked /><span class="slider"></span></label>
      <span>Size by links</span>
    </div>
    <div class="actions">
      <button class="ghost" id="reset" type="button">Reset view</button>
      <button class="ghost" id="reset-settings" type="button">Default settings</button>
    </div>
  </div>

  <div id="card" class="panel">
    <div class="top">
      <img id="card-img" alt="" />
      <div>
        <div class="title" id="card-title"></div>
        <div class="slug" id="card-slug"></div>
      </div>
    </div>
    <div class="tag" id="card-tag"></div>
    <div class="hint" id="card-hint">Double-click to open</div>
  </div>

  <div id="loading">Charting the constellation...</div>

  <script src="assets/vendor/graphology.umd.min.js"></script>
  <script src="assets/vendor/sigma.min.js"></script>
  <script src="app.js"></script>
</body>
</html>

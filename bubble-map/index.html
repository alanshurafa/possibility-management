<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SpacePort — PM Bubble Map</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='11' fill='%237dd3fc'/%3E%3C/svg%3E" />
<style>
  :root {
    --bg0: #05060e;
    --bg1: #0a0e22;
    --panel: rgba(15, 20, 40, 0.62);
    --panel-brd: rgba(125, 180, 230, 0.18);
    --ink: #e6ecff;
    --ink-dim: #8a96c0;
    --accent: #7dd3fc;
    --accent-2: #b794f6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    font: 14px/1.5 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1200px 800px at 78% 18%, rgba(80, 60, 160, 0.22), transparent 60%),
      radial-gradient(900px 700px at 12% 88%, rgba(20, 90, 150, 0.20), transparent 55%),
      radial-gradient(circle at 50% 50%, var(--bg1), var(--bg0) 75%);
  }
  /* Starfield: three layered dot patterns of differing density/size */
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.9; }

  #sigma-container { position: absolute; inset: 0; z-index: 1; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-brd);
    border-radius: 14px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
  }

  /* Header */
  #header {
    position: absolute; z-index: 5; top: 18px; left: 18px;
    padding: 12px 16px; max-width: 340px;
  }
  #header h1 {
    margin: 0; font-size: 17px; font-weight: 650; letter-spacing: 0.2px;
    display: flex; align-items: center; gap: 9px;
  }
  #header h1 .dot {
    width: 11px; height: 11px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #cfeaff, var(--accent) 55%, #2b6cb0);
    box-shadow: 0 0 12px var(--accent);
  }
  #header .sub { margin-top: 5px; color: var(--ink-dim); font-size: 12px; }
  #header .badge {
    display: inline-block; margin-left: 6px; padding: 1px 7px; border-radius: 999px;
    font-size: 10.5px; font-weight: 600; color: #08111f;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
  }

  /* Search */
  #search-wrap { position: absolute; z-index: 5; top: 18px; right: 18px; }
  #search {
    width: 230px; padding: 9px 13px; border-radius: 10px;
    background: rgba(8, 12, 28, 0.7); color: var(--ink);
    border: 1px solid var(--panel-brd); outline: none; font-size: 13px;
  }
  #search::placeholder { color: var(--ink-dim); }
  #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.15); }

  /* A–Z rail */
  #rail {
    position: absolute; z-index: 5; left: 16px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 1px; padding: 8px 6px;
    align-items: center;
  }
  #rail button {
    all: unset; cursor: pointer; width: 20px; height: 18px; text-align: center;
    font-size: 11px; font-weight: 600; color: var(--ink-dim); border-radius: 5px;
    transition: color .12s, background .12s;
  }
  #rail button[data-has="1"] { color: var(--ink); }
  #rail button[data-has="1"]:hover { background: rgba(125, 211, 252, 0.16); color: #fff; }
  #rail button[disabled] { opacity: 0.28; cursor: default; }
  #rail button.active { background: linear-gradient(90deg, var(--accent), var(--accent-2)); color: #08111f; }

  /* Controls (bottom-left) */
  #controls {
    position: absolute; z-index: 5; left: 18px; bottom: 18px;
    padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; font-size: 12.5px;
  }
  #controls .row { display: flex; align-items: center; gap: 9px; }
  .switch { position: relative; width: 34px; height: 19px; flex: none; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; border-radius: 999px; cursor: pointer;
    background: rgba(120, 130, 170, 0.35); transition: .18s;
  }
  .slider::before {
    content: ""; position: absolute; height: 13px; width: 13px; left: 3px; top: 3px;
    background: #e6ecff; border-radius: 50%; transition: .18s;
  }
  .switch input:checked + .slider { background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
  .switch input:checked + .slider::before { transform: translateX(15px); }
  .legend-line { display: flex; align-items: center; gap: 8px; color: var(--ink-dim); }
  .legend-line .sw { width: 22px; height: 0; border-top: 2px solid; }
  #reset {
    all: unset; cursor: pointer; color: var(--accent); font-weight: 600;
    padding: 4px 0; width: max-content;
  }
  #reset:hover { text-decoration: underline; }

  /* Hover info card (bottom-right) */
  #card {
    position: absolute; z-index: 5; right: 18px; bottom: 18px; width: 280px;
    padding: 14px; opacity: 0; transform: translateY(8px); transition: opacity .15s, transform .15s;
    pointer-events: none;
  }
  #card.show { opacity: 1; transform: translateY(0); }
  #card .top { display: flex; gap: 12px; align-items: center; }
  #card img { width: 56px; height: 56px; border-radius: 50%; flex: none; object-fit: cover;
    border: 1px solid var(--panel-brd); box-shadow: 0 0 16px rgba(125, 211, 252, 0.25); }
  #card .title { font-weight: 650; font-size: 15px; }
  #card .slug { color: var(--accent); font-size: 11.5px; }
  #card .tag { margin-top: 9px; color: var(--ink-dim); font-size: 12.5px; }
  #card .hint { margin-top: 9px; font-size: 11px; color: var(--ink-dim); opacity: 0.8; }

  #loading {
    position: absolute; z-index: 6; inset: 0; display: grid; place-items: center;
    color: var(--ink-dim); font-size: 13px; letter-spacing: 0.3px;
  }
</style>
</head>
<body>
  <svg id="stars"></svg>
  <div id="sigma-container"></div>

  <div id="header" class="panel">
    <h1><span class="dot"></span> SpacePort</h1>
    <div class="sub" id="counts">Possibility Management bubble map · loading…</div>
    <div class="sub" style="margin-top:3px"><a id="archive-link" href="archive/index.html" style="color:var(--accent);text-decoration:none">Browse the A–Z archive →</a></div>
    <div class="sub" id="build-status" style="margin-top:3px;opacity:.75"></div>
  </div>

  <div id="search-wrap">
    <input id="search" type="search" placeholder="Search sites…" autocomplete="off" />
  </div>

  <nav id="rail" class="panel" aria-label="A to Z index"></nav>

  <div id="controls" class="panel">
    <div class="row">
      <label class="switch"><input type="checkbox" id="toggle-organic" /><span class="slider"></span></label>
      <span>Show organic links</span>
    </div>
    <div class="legend-line"><span class="sw" style="border-color:#6eb4dc"></span> curated “Also see”</div>
    <div class="legend-line"><span class="sw" style="border-color:#9d8cd0"></span> organic links</div>
    <div class="legend-line" style="opacity:.65">Click a bubble to isolate its links · double-click opens · empty space resets</div>
    <a id="reset">Reset view</a>
  </div>

  <div id="card" class="panel">
    <div class="top">
      <img id="card-img" alt="" />
      <div>
        <div class="title" id="card-title"></div>
        <div class="slug" id="card-slug"></div>
      </div>
    </div>
    <div class="tag" id="card-tag"></div>
    <div class="hint" id="card-hint">Double-click to open ↗</div>
  </div>

  <div id="loading">Charting the constellation…</div>

  <script src="assets/vendor/graphology.umd.min.js"></script>
  <script src="assets/vendor/sigma.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
